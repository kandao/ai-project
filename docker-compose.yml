version: "3.9"

services:

  # ── Zookeeper (Kafka coordinator) ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: docqa
      POSTGRES_USER: docqa
      POSTGRES_PASSWORD: docqa
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docqa -d docqa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://docqa:docqa@postgres/docqa
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: "60"
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /data/uploads
      MAX_UPLOAD_SIZE_MB: "50"
      RATE_LIMIT_REQUESTS_PER_MINUTE: "30"
    volumes:
      - upload-data:/data/uploads

  # ── Ingestion Worker ──────────────────────────────────────────────────────
  worker:
    build: ./worker
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://docqa:docqa@postgres/docqa
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EMBEDDING_PROVIDER: voyage
      EMBEDDING_MODEL: voyage-3
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /data/uploads
    volumes:
      - upload-data:/data/uploads

  # ── Agent (ReAct loop) ────────────────────────────────────────────────────
  agent:
    build: ./agent
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://docqa:docqa@postgres/docqa
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-voyage}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-voyage-3}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      BACKEND_INTERNAL_URL: http://backend:8000

volumes:
  postgres-data:
  upload-data:
